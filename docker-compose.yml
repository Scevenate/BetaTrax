services:
  betatrax:
    build: .
    environment:
      - POSTGRES_NAME=betatrax
      - POSTGRES_USER=betatrax
      - POSTGRES_PASSWORD=betatrax
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DJANGO_PORT=8000
    ports:
      - 8000:8000
    depends_on:
      - postgres
    volumes:
      - ./data/migrations:/app/BetaTrax/migrations
  postgres:
    image: postgres:18
    environment:
      - POSTGRES_USER=betatrax
      - POSTGRES_PASSWORD=betatrax
      - POSTGRES_DB=betatrax
    volumes:
      - ./data/postgres:/var/lib/postgresql